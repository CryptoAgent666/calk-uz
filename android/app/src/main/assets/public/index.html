<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5">
  <title>Calk.UZ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FAFBFC;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .container { max-width: 360px; }
    .icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 8px 24px rgba(5, 150, 105, 0.3);
    }
    .icon svg { width: 40px; height: 40px; fill: white; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .brand { color: #059669; }
    p { font-size: 15px; color: #6b7280; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: #059669;
      color: white;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      border: none;
      cursor: pointer;
    }
    .btn:active { background: #047857; }
    .offline-msg { font-size: 13px; color: #9ca3af; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="2" width="16" height="20" rx="2"/>
        <line x1="8" y1="6" x2="16" y2="6"/>
        <line x1="16" y1="14" x2="16" y2="18"/>
        <line x1="8" y1="10" x2="8" y2="10.01"/>
        <line x1="12" y1="10" x2="12" y2="10.01"/>
        <line x1="16" y1="10" x2="16" y2="10.01"/>
        <line x1="8" y1="14" x2="8" y2="14.01"/>
        <line x1="12" y1="14" x2="12" y2="14.01"/>
        <line x1="8" y1="18" x2="8" y2="18.01"/>
        <line x1="12" y1="18" x2="12" y2="18.01"/>
      </svg>
    </div>
    <h1><span class="brand">Calk</span>.UZ</h1>
    <p>78 бесплатных онлайн-калькуляторов для Узбекистана: налоги, зарплата, кредиты, вклады и другие расчёты.</p>
    <button class="btn" onclick="location.reload()">Обновить</button>
    <p class="offline-msg">Нет подключения к интернету. Проверьте соединение и попробуйте снова.</p>
  </div>
</body>
</html>
