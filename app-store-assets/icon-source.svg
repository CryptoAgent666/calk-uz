<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
  </defs>
  <!-- full-bleed opaque background (iOS masks the corners) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <!-- calculator card -->
  <rect x="288" y="196" width="448" height="632" rx="72" fill="#ffffff" fill-opacity="0.16"/>
  <rect x="288" y="196" width="448" height="632" rx="72" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="3"/>
  <!-- screen -->
  <rect x="340" y="256" width="344" height="120" rx="28" fill="#04432c"/>
  <!-- row 1 (gold accent key) -->
  <rect x="340" y="430" width="96" height="96" rx="22" fill="#ffffff" fill-opacity="0.95"/>
  <rect x="464" y="430" width="96" height="96" rx="22" fill="#ffffff" fill-opacity="0.95"/>
  <rect x="588" y="430" width="96" height="96" rx="22" fill="#D4A843"/>
  <!-- row 2 -->
  <rect x="340" y="554" width="96" height="96" rx="22" fill="#ffffff" fill-opacity="0.95"/>
  <rect x="464" y="554" width="96" height="96" rx="22" fill="#ffffff" fill-opacity="0.95"/>
  <rect x="588" y="554" width="96" height="96" rx="22" fill="#ffffff" fill-opacity="0.95"/>
  <!-- row 3 -->
  <rect x="340" y="678" width="96" height="96" rx="22" fill="#ffffff" fill-opacity="0.95"/>
  <rect x="464" y="678" width="96" height="96" rx="22" fill="#ffffff" fill-opacity="0.95"/>
  <rect x="588" y="678" width="96" height="96" rx="22" fill="#ffffff" fill-opacity="0.95"/>
</svg>
