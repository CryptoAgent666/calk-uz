<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calk.UZ — Нет соединения</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FAFBFC; color: #1a1a2e;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px; text-align: center;
    }
    .container { max-width: 360px; }
    .icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 8px 24px rgba(5, 150, 105, 0.3);
    }
    .icon svg { width: 40px; height: 40px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .brand { color: #059669; }
    p { font-size: 15px; color: #6b7280; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block; background: #059669; color: white;
      padding: 14px 32px; border-radius: 12px; text-decoration: none;
      font-weight: 600; font-size: 15px; border: none; cursor: pointer;
    }
    .btn:active { background: #047857; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1><span class="brand">Calk</span>.UZ</h1>
    <p>Нет подключения к интернету. Откройте калькуляторы онлайн хотя бы один раз — потом они будут работать и без интернета.</p>
    <button class="btn" onclick="location.reload()">Повторить</button>
  </div>
</body>
</html>
